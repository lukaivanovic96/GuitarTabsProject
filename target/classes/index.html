<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Таблатуре</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header">
        <div class="logo">
            <img src="./images/guitar_tabs_logo_4.png" width="200" alt="Guitar tabs logo">
        </div>
        <div class="navigation">
            <nav>
                <a class="home_link nav_link" href="index.html">Почетна</a>
                <a class="artists_link nav_link" href="artists.html">Извођачи</a>
                <a class="songs_link nav_link" href="songs.html">Песме</a>
                <a class="about_us_link nav_link" href="about_us.html">О нама</a>
            </nav>
        </div>
    </header>

    <section class="artists">
        <div class="container">
            <h1 id="artists-list-title">Извођачи</h1>
            <ul class="mini-artists-list" id="mini-artists-list"></ul>
            
            <a style="text-decoration: none; color: #ff9800; margin: 10px;" href="artists.html">Кликни овде за више извођача</a>
            
            <form id="artist-form" action="" method="POST">
                <label for="artistName">Име извођача</label>
                <input type="text" id="name">
                <label for="artistSurname">Презиме извођача</label>
                <input type="text" id="surname">
                <button class="artist-form-btn">Додај извођача</button>
            </form>
        </div>
    </section>

    <section>
        <div class="container">

        </div>
    </section>

    <footer>
        <div class="copyright">
            <p></p>
        </div>
    </footer>

    <script type="module" src="/js/index.js"></script>
</body>
</html>
